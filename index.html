    <style>
        * {
            margin: 0;

        }

        /* ===== KARTU UTAMA - SIMPLE & MINIMALIS ===== */
        .card {
            max-width: 700px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 2.5rem 2.5rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 8px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0ebe0;

            position: relative;
        }

        /* ===== VIDEO STREAM - POJOK KANAN ATAS ===== */

            position: fixed;
            top: 20px;
            right: 20px;
            width: 280px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            border: 2px solid #ffffff;
            background: #0a0a0a;
            aspect-ratio: 16 / 9;
            z-index: 9999;

        }

        .video-wrapper:hover {
            transform: scale(1.02);

        .video-wrapper video {
            width: 100%;
            height: 100%;

        .facemesh-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .facemesh-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* ===== LABEL VIDEO MINIMALIS ===== */
        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.5rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            z-index: 2;

            align-items: center;
            gap: 4px;
            pointer-events: none;

        }

        .cam-status {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);

        .dot.active {

        }

        .hd-badge {

            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;

            z-index: 2;

<body>

    <script>
        // ============================================================
        // KONTROL KAMERA
        // ============================================================
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let stream = null;
        let facemeshRunning = false;

        function updateStatus(isActive) {
            if (isActive) {
                statusDot.className = 'dot active';
                statusText.textContent = 'Online';
                statusText.style.color = '#4caf50';
            } else {
                statusDot.className = 'dot inactive';
                statusText.textContent = 'Offline';
                statusText.style.color = '#fff';
            }
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    },
                    audio: false
                });

                video.srcObject = stream;
                await video.play();
                updateStatus(true);
                startBtn.disabled = true;
                stopBtn.disabled = false;

                setTimeout(() => startFaceMesh(), 500);

                console.log('📷 Kamera aktif');
            } catch (err) {
                console.error('❌ Gagal akses kamera:', err);
                alert('Tidak dapat mengakses kamera. Pastikan Anda telah mengizinkan akses kamera.');
                updateStatus(false);
                startBtn.disabled = false;
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                video.srcObject = null;
                updateStatus(false);
                startBtn.disabled = false;
                stopBtn.disabled = true;
                stopFaceMesh();
                console.log('📷 Kamera dihentikan');
            }
        }

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);

        // ============================================================
        // FACEMESH - TANPA OVERLAY VISUAL
        // ============================================================
        const canvas = document.getElementById('facemeshCanvas');
        const canvasCtx = canvas.getContext('2d');
        let faceMesh = null;
        let cameraHelper = null;

        const exprValue = document.getElementById('exprValue');
        const blinkStatus = document.getElementById('blinkStatus');
        const mouthStatus = document.getElementById('mouthStatus');

        let expressionHistory = [];
        const HISTORY_SIZE = 5;

        function resizeCanvas() {
            const container = document.getElementById('facemeshContainer');
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        window.addEventListener('resize', resizeCanvas);

        function detectExpression(landmarks) {
            const leftEyeTop = landmarks[159];
            const leftEyeBottom = landmarks[145];
            const leftEyeLeft = landmarks[33];
            const leftEyeRight = landmarks[133];

            const rightEyeTop = landmarks[386];
            const rightEyeBottom = landmarks[374];
            const rightEyeLeft = landmarks[362];
            const rightEyeRight = landmarks[263];

            const mouthTop = landmarks[13];
            const mouthBottom = landmarks[14];
            const mouthLeft = landmarks[61];
            const mouthRight = landmarks[291];

            const leftEyebrow = landmarks[46];
            const rightEyebrow = landmarks[276];

            function calculateEAR(eyeTop, eyeBottom, eyeLeft, eyeRight) {
                const vertical = Math.sqrt(
                    Math.pow(eyeTop.x - eyeBottom.x, 2) +
                    Math.pow(eyeTop.y - eyeBottom.y, 2)
                );
                const horizontal = Math.sqrt(
                    Math.pow(eyeLeft.x - eyeRight.x, 2) +
                    Math.pow(eyeLeft.y - eyeRight.y, 2)
                );
                return vertical / horizontal;
            }

            const leftEAR = calculateEAR(leftEyeTop, leftEyeBottom, leftEyeLeft, leftEyeRight);
            const rightEAR = calculateEAR(rightEyeTop, rightEyeBottom, rightEyeLeft, rightEyeRight);
            const avgEAR = (leftEAR + rightEAR) / 2;

            const BLINK_THRESHOLD = 0.18;
            const isBlinking = avgEAR < BLINK_THRESHOLD;

            const mouthHeight = Math.sqrt(
                Math.pow(mouthTop.x - mouthBottom.x, 2) +
                Math.pow(mouthTop.y - mouthBottom.y, 2)
            );
            const mouthWidth = Math.sqrt(
                Math.pow(mouthLeft.x - mouthRight.x, 2) +
                Math.pow(mouthLeft.y - mouthRight.y, 2)
            );
            const mouthRatio = mouthHeight / mouthWidth;
            const isMouthOpen = mouthRatio > 0.3;

            const mouthLeftCorner = landmarks[61];
            const mouthRightCorner = landmarks[291];
            const mouthCenter = landmarks[13];

            const leftAngle = Math.atan2(
                mouthLeftCorner.y - mouthCenter.y,
                mouthLeftCorner.x - mouthCenter.x
            );
            const rightAngle = Math.atan2(
                mouthRightCorner.y - mouthCenter.y,
                mouthRightCorner.x - mouthCenter.x
            );

            const smileScore = Math.abs(leftAngle) + Math.abs(rightAngle);
            const isSmiling = smileScore > 0.7 && !isMouthOpen;
            const isFrowning = mouthTop.y > mouthBottom.y * 0.3 && !isSmiling;
            const isSurprised = avgEAR > 0.35 && isMouthOpen;
            const eyebrowDistance = Math.abs(leftEyebrow.y - rightEyebrow.y);
            const isAngry = eyebrowDistance < 0.03 && !isSmiling && !isSurprised;

            let expression = 'neutral';
            let expressionIcon = 'fa-meh';
            let expressionClass = 'expr-neutral';
            let expressionName = 'Netral';

            if (isBlinking) {
                expression = 'blink';
                expressionIcon = 'fa-eye';
                expressionClass = 'expr-blink';
                expressionName = 'Berkedip 👁️';
            } else if (isSurprised) {
                expression = 'surprised';
                expressionIcon = 'fa-surprise';
                expressionClass = 'expr-surprised';
                expressionName = 'Terkejut 😮';
            } else if (isSmiling) {
                expression = 'happy';
                expressionIcon = 'fa-smile';
                expressionClass = 'expr-happy';
                expressionName = 'Tersenyum 😊';
            } else if (isFrowning) {
                expression = 'sad';
                expressionIcon = 'fa-frown';
                expressionClass = 'expr-sad';
                expressionName = 'Cemberut ☹️';
            } else if (isAngry) {
                expression = 'angry';
                expressionIcon = 'fa-angry';
                expressionClass = 'expr-angry';
                expressionName = 'Marah 😠';
            } else {
                expression = 'neutral';
                expressionIcon = 'fa-meh';
                expressionClass = 'expr-neutral';
                expressionName = 'Netral 😐';
            }

            expressionHistory.push(expression);
            if (expressionHistory.length > HISTORY_SIZE) {
                expressionHistory.shift();
            }

            const freq = {};
            for (const e of expressionHistory) {
                freq[e] = (freq[e] || 0) + 1;
            }
            let maxFreq = 0;
            let smoothedExpression = 'neutral';
            for (const [e, count] of Object.entries(freq)) {
                if (count > maxFreq) {
                    maxFreq = count;
                    smoothedExpression = e;
                }
            }

            const exprMap = {
                'blink': { icon: 'fa-eye', class: 'expr-blink', name: 'Berkedip 👁️' },
                'surprised': { icon: 'fa-surprise', class: 'expr-surprised', name: 'Terkejut 😮' },
                'happy': { icon: 'fa-smile', class: 'expr-happy', name: 'Tersenyum 😊' },
                'sad': { icon: 'fa-frown', class: 'expr-sad', name: 'Cemberut ☹️' },
                'angry': { icon: 'fa-angry', class: 'expr-angry', name: 'Marah 😠' },
                'neutral': { icon: 'fa-meh', class: 'expr-neutral', name: 'Netral 😐' }
            };

            const exprInfo = exprMap[smoothedExpression] || exprMap['neutral'];
            exprValue.className = `expr-value ${exprInfo.class}`;
            exprValue.innerHTML = `<i class="fas ${exprInfo.icon}"></i> ${exprInfo.name}`;

            const blinkText = isBlinking ? 'Tertutup' : 'Terbuka';
            const mouthText = isMouthOpen ? 'Terbuka' : 'Tertutup';
            blinkStatus.innerHTML = `<i class="fas fa-eye"></i> ${blinkText}`;
            blinkStatus.style.color = isBlinking ? '#f5c542' : '#888';
            mouthStatus.innerHTML = `<i class="fas fa-mouth"></i> ${mouthText}`;
            mouthStatus.style.color = isMouthOpen ? '#f5c542' : '#888';
        }

        function startFaceMesh() {
            if (facemeshRunning) return;
            resizeCanvas();

            faceMesh = new FaceMesh({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                }
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults((results) => {
                const container = document.getElementById('facemeshContainer');
                const rect = container.getBoundingClientRect();
                if (canvas.width !== rect.width || canvas.height !== rect.height) {
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                }

                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const landmarks = results.multiFaceLandmarks[0];
                    detectExpression(landmarks);
                }
            });

            cameraHelper = new Camera(video, {
                onFrame: async () => {
                    try {
                        await faceMesh.send({ image: video });
                    } catch (err) {
                        // silent
                    }
                },
                width: 640,
                height: 480
            });

            cameraHelper.start().then(() => {
                facemeshRunning = true;
                console.log('✅ FaceMesh started');
            }).catch(err => {
                console.error('❌ FaceMesh error:', err);
            });
        }

        function stopFaceMesh() {
            if (cameraHelper) {
                cameraHelper.stop();
                cameraHelper = null;
            }
            if (faceMesh) {
                faceMesh.close();
                faceMesh = null;
            }
            facemeshRunning = false;
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            console.log('⏹️ FaceMesh stopped');
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Browser Anda tidak mendukung akses kamera.');
            startBtn.disabled = true;
        }
    </script>
</body>
</html>
